name: Deploy Backend to AWS EC2

on:
  push:
    branches:
      - main

jobs:
#   # -------------------------------------------------------------
#   # JOB 1: Test (Commented out for now until you write tests)
#   # -------------------------------------------------------------
#   test:
#     runs-on: ubuntu-latest
#     steps:
#       - name: Checkout Code
